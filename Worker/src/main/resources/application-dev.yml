spring:
  datasource:
    # Sb Run locally & DB in Docker-- user & Pass use any => rutwik, rutwik OR root, root -------------
#    url: jdbc:mysql://localhost:3307/construction

    # SB & DB both run locally-----------
    url: jdbc:mysql://localhost:3306/construction
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false