apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service

spec:
  replicas: 3

  selector:
    matchLabels:
      app: worker

  template:
    metadata:
      labels:
        app: worker

    spec:
      containers:
        - name: worker
          image: rutwikbalkhande/construction-worker:latest

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: worker-config

            - secretRef:
                name: worker-secret