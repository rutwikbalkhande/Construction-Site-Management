server:
  port: 8082

spring:
  application:
    name: SITE-TASK-SERVICE

  profiles:
    active: dev   # default profile for local development

  cache:
    type: redis

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

